spring.application.name=lms
# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (PostgreSQL)
# ===============================
# Asegúrate de que tu servidor PostgreSQL esté corriendo en el puerto 5432 (el por defecto)
# y de haber creado una base de datos vacía llamada 'lms' antes de correr el proyecto.
spring.datasource.url=jdbc:postgresql://localhost:5432/lms
spring.datasource.username=tu_usuario_de_postgres
spring.datasource.password=tu_contraseńa_de_postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 'update' creará o actualizará las tablas automáticamente según tus entidades
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola para ayudarte a depurar
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080